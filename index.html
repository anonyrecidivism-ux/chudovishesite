<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>blood ravens // terminal</title>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@300;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0a0a;
            --term-bg: #121212;
            --accent: #ff007f; /* Яскраво-рожевий */
            --accent-glow: rgba(255, 0, 127, 0.4);
            --text: #d0d0d0;
            --dim: #333;
            --border: #222;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Fira Code', monospace;
            margin: 0; padding: 0;
            overflow-x: hidden;
            text-transform: lowercase;
        }

        .container { width: 92%; max-width: 800px; margin: 0 auto; padding: 40px 0; display: flex; flex-direction: column; align-items: center; }

        .lang-switch { display: flex; gap: 15px; justify-content: flex-end; width: 100%; margin-bottom: 25px; }
        .lang-btn { background: none; border: 1px solid var(--border); color: var(--dim); cursor: pointer; padding: 5px 12px; font-family: inherit; font-size: 11px; }
        .lang-btn.active { color: var(--accent); border-color: var(--accent); }

        /* ЛОГОТИП ЮІ (ЗАШИТИЙ НАМЕРТВО) */
        .logo-wrap {
            margin-bottom: 40px;
            position: relative;
        }
        .clan-logo {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            border: 2px solid var(--accent);
            box-shadow: 0 0 30px var(--accent-glow);
            object-fit: cover;
            filter: contrast(1.1);
        }

        .terminal-header {
            border-bottom: 1px solid var(--border);
            padding-bottom: 20px;
            margin-bottom: 30px;
            text-align: center;
            width: 100%;
        }
        .term-title { color: var(--accent); font-size: 26px; letter-spacing: 5px; font-weight: 500; }
        .term-sub { font-size: 10px; color: var(--dim); margin-top: 5px; letter-spacing: 2px; }

        .info-block {
            margin-bottom: 40px;
            padding: 20px;
            border: 1px dashed var(--border);
            font-size: 14px;
            line-height: 1.6;
            width: 100%;
            box-sizing: border-box;
            background: rgba(255, 0, 127, 0.02);
        }
        .info-block b { color: var(--accent); }

        .section-label { font-size: 11px; color: var(--dim); margin: 30px 0 20px 0; letter-spacing: 4px; display: block; width: 100%; text-align: left;}

        #team-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 15px;
            width: 100%;
        }
        .card {
            background: var(--term-bg);
            border: 1px solid var(--border);
            padding: 15px;
            transition: 0.2s;
            position: relative;
        }
        .card:hover { border-color: var(--accent); background: rgba(255, 0, 127, 0.03); }
        .card::before { content: ">"; position: absolute; left: 8px; color: var(--accent); opacity: 0; }
        .card:hover::before { opacity: 1; }
        
        .nick { font-weight: 500; color: #fff; margin-left: 15px; font-size: 14px; }
        .role { color: var(--accent); font-size: 11px; margin-top: 5px; margin-left: 15px; opacity: 0.8; }

        .footer {
            text-align: center;
            padding: 60px 0 20px 0;
            font-size: 10px;
            color: #1a1a1a;
            letter-spacing: 4px;
            width: 100%;
        }
    </style>
</head>

<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TERMINAL // OSINT UNIT</title>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@300;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0a0a;
            --term-bg: #121212;
            --accent: #ff0000; /* Кроваво-красный */
            --text: #d0d0d0;
            --dim: #444;
            --border: #222;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Fira Code', monospace;
            margin: 0; padding: 0;
            overflow-x: hidden;
            text-transform: lowercase;
        }

        .container { width: 92%; max-width: 800px; margin: 0 auto; padding: 40px 0; }

        /* LANG SWITCHER */
        .lang-switch { display: flex; gap: 15px; justify-content: flex-end; margin-bottom: 20px; }
        .lang-btn { background: none; border: 1px solid var(--border); color: var(--dim); cursor: pointer; padding: 4px 10px; font-family: inherit; font-size: 11px; }
        .lang-btn.active { color: var(--accent); border-color: var(--accent); }

        /* КРАСНЫЙ ВОРОН (SVG) */
        .logo-wrap { text-align: center; margin-bottom: 40px; }
        .raven-icon { width: 80px; fill: var(--accent); filter: drop-shadow(0 0 10px rgba(255, 0, 0, 0.4)); }

        /* ТЕРМИНАЛ ХЕДЕР */
        .terminal-header {
            border-bottom: 1px solid var(--border);
            padding-bottom: 20px;
            margin-bottom: 40px;
        }
        .term-title { color: var(--accent); font-size: 18px; letter-spacing: 2px; }
        .term-sub { font-size: 10px; color: var(--dim); margin-top: 5px; }

        /* СЕТКА УЧАСТНИКОВ */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 15px;
        }
        .card {
            background: var(--term-bg);
            border: 1px solid var(--border);
            padding: 15px;
            transition: 0.2s;
            position: relative;
        }
        .card:hover { border-color: var(--accent); }
        .card::before { content: ">"; position: absolute; left: 8px; color: var(--accent); opacity: 0; transition: 0.2s; }
        .card:hover::before { opacity: 1; }
        
        .nick { font-weight: 500; color: #fff; margin-left: 15px; }
        .role { color: var(--accent); font-size: 11px; margin-top: 5px; margin-left: 15px; opacity: 0.8; }

        /* ИНФО БЛОК */
        .info-block {
            margin-top: 50px;
            padding: 20px;
            border: 1px dashed var(--dim);
            font-size: 13px;
            line-height: 1.6;
        }
        .info-block b { color: var(--accent); }

        .footer {
            text-align: center;
            padding: 80px 0 20px 0;
            font-size: 10px;
            color: #1a1a1a;
            letter-spacing: 4px;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="lang-switch">
        <button class="lang-btn active" onclick="setLang('ru')">ru</button>
        <button class="lang-btn" onclick="setLang('en')">en</button>
    </div>

    <div class="logo-wrap">
        <svg class="raven-icon" viewBox="0 0 24 24">
            <path d="M21,12C21,12 19,5 12,5C5,5 3,12 3,12C3,12 5,19 12,19C19,19 21,12 21,12M12,17C9.24,17 7,14.76 7,12C7,9.24 9.24,7 12,7C14.76,7 17,9.24 17,12C17,14.76 14.76,17 12,17M12,9C10.34,9 9,10.34 9,12C9,13.66 10.34,15 12,15C13.66,15 15,13.66 15,12C15,10.34 13.66,9 12,9Z" opacity="0.2"/>
            <path d="M12,2L4.5,20.29L5.21,21L12,18L18.79,21L19.5,20.29L12,2Z" />
        </svg>
    </div>

    <header class="terminal-header">
        <div class="term-title" id="t-head">root@osint_unit:~#</div>
        <div class="term-sub" id="t-sub">established 2026 // active protection</div>
    </header>

    <div class="info-block" id="t-desc">
        мы используем <b>osint</b> и цифровые инструменты для обеспечения безопасности. наша цель — защита мирных пользователей и пресечение деструктивной деятельности в сети.
    </div>

    <div class="section-title" style="margin: 40px 0 20px 0; font-size: 12px; color: var(--dim);">[ system_users ]</div>

    <div class="grid" id="team-grid">
        </div>

    <div class="footer">
        made by @recidivismnational // sys_id_026
    </div>
</div>

<script>
    const team = [
        { n: "@xuvof", r: "осинт/эдитор", e: "osint/editor" },
        { n: "@fallen_fly", r: "осинт", e: "osint" },
        { n: "@recidivismnational", r: "кодер/дизайнер", e: "coder/designer" },
        { n: "@fucksomer", r: "осинт", e: "osint" },
        { n: "@UnTaLeNteD0", r: "тролль", e: "troll" },
        { n: "@loreitov", r: "осинт", e: "osint" },
        { n: "@Bladiclavaa", r: "тролль", e: "troll" },
        { n: "@wortix69", r: "осинт/тролль", e: "osint/troll" },
        { n: "@aominx", r: "осинт", e: "osint" },
        { n: "@martxxxxxxxxx", r: "осинт", e: "osint" }
    ];

    const langData = {
        ru: { head: "root@osint_unit:~#", sub: "основано 2026 // активная защита", desc: "мы используем <b>osint</b> и цифровые инструменты для обеспечения безопасности. наша цель — защита мирных пользователей и пресечение деструктивной деятельности в сети." },
        en: { head: "root@osint_unit:~#", sub: "est. 2026 // active defense", desc: "we utilize <b>osint</b> and digital tools to maintain security. our mission is to protect peaceful users and neutralize destructive online activity." }
    };

    function setLang(lang) {
        document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
        event.target.classList.add('active');
        
        document.getElementById('t-head').innerText = langData[lang].head;
        document.getElementById('t-sub').innerText = langData[lang].sub;
        document.getElementById('t-desc').innerHTML = langData[lang].desc;

        const grid = document.getElementById('team-grid');
        grid.innerHTML = team.map(m => `
            <div class="card">
                <div class="nick">${m.n}</div>
                <div class="role">${lang === 'ru' ? m.r : m.e}</div>
            </div>
        `).join('');
    }

    // Инициализация
    setLang('ru');
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>blood ravens // terminal</title>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@300;500&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/scrollreveal"></script>
    <style>
        :root {
            --bg: #0a0a0a;
            --term-bg: #121212;
            --accent: #ff4da6; /* 🔥 БЫЛО КРАСНОЕ */
            --accent-glow: rgba(255, 77, 166, 0.4); /* 🔥 БЫЛО КРАСНОЕ */
            --text: #d0d0d0;
            --dim: #333;
            --border: #222;
            --font-mono: 'Fira Code', monospace;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: var(--font-mono);
            margin: 0; padding: 0;
            overflow-x: hidden;
            text-transform: lowercase;
        }

        .container { width: 92%; max-width: 800px; margin: 0 auto; padding: 40px 0; display: flex; flex-direction: column; align-items: center; position: relative; z-index: 1;}

        .lang-switch { display: flex; gap: 15px; justify-content: flex-end; width: 100%; margin-bottom: 25px; }
        .lang-btn { background: none; border: 1px solid var(--border); color: var(--dim); cursor: pointer; padding: 5px 12px; font-family: inherit; font-size: 11px; }
        .lang-btn.active { color: var(--accent); border-color: var(--accent); }

        .logo-wrap {
            margin-bottom: 45px;
            position: relative;
            cursor: pointer;
            transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .logo-wrap:hover { transform: scale(1.08) rotate(2deg); }
        .clan-logo {
            width: 140px;
            height: 140px;
            border-radius: 50%;
            border: 2px solid var(--border);
            box-shadow: 0 0 35px var(--accent-glow);
            filter: contrast(1.1) brightness(0.98);
            object-fit: cover;
        }

        .terminal-header {
            border-bottom: 1px solid var(--border);
            padding-bottom: 25px;
            margin-bottom: 40px;
            text-align: center;
            width: 100%;
        }
        .term-title { color: var(--accent); font-size: 26px; letter-spacing: 5px; font-weight: 500; text-shadow: 0 0 10px rgba(255, 77, 166, 0.3); }
        .term-sub { font-size: 10px; color: var(--dim); margin-top: 6px; letter-spacing: 3px; }

        .info-block {
            margin-bottom: 50px;
            padding: 22px;
            border: 1px dashed var(--border);
            font-size: 14px;
            line-height: 1.7;
            width: 100%;
            box-sizing: border-box;
            background: rgba(255,77,166,0.01);
            font-weight: 300;
        }
        .info-block b { color: var(--accent); }

        .section-label { font-size: 11px; color: var(--dim); margin: 30px 0 25px 0; letter-spacing: 5px; text-transform: uppercase; display: block; width: 100%; text-align: left;}

        #team-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 15px;
            width: 100%;
        }
        .card {
            background: var(--term-bg);
            border: 1px solid var(--border);
            padding: 18px;
            transition: 0.15s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
        }
        .card:hover { border-color: var(--accent); background: rgba(255,77,166,0.02); box-shadow: 0 0 15px rgba(255, 77, 166, 0.05); }
        .card::before { content: ">"; position: absolute; left: 8px; color: var(--accent); opacity: 0; }
        .card:hover::before { opacity: 1; }
        
        .nick { font-weight: 500; color: #fff; margin-left: 18px; font-size: 15px; }
        .role { color: var(--accent); font-size: 11px; margin-top: 5px; margin-left: 18px; opacity: 0.8; letter-spacing: 1px; }

        .footer {
            text-align: center;
            padding: 90px 0 20px 0;
            font-size: 10px;
            color: #1a1a1a;
            letter-spacing: 5px;
            width: 100%;
            font-weight: 300;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="lang-switch reveal">
        <button class="lang-btn active" id="btn-ru" onclick="setLang('ru')">ru</button>
        <button class="lang-btn" id="btn-en" onclick="setLang('en')">en</button>
    </div>

    <div class="logo-wrap reveal">
        <!-- 🔥 ТВОЙ ЛОГО -->
        <img src="file:///mnt/data/0.png" alt="yui" class="clan-logo">
    </div>

    <header class="terminal-header reveal">
        <div class="term-title" id="t-head">blood ravens</div>
        <div class="term-sub" id="t-sub">established 2026 // active protection :3</div>
    </header>

    <div class="info-block reveal" id="t-desc">
        мы используем <b>osint</b> и цифровые инструменты для обеспечения безопасности. наша цель — защита мирных пользователей и пресечение деструктивной деятельности в сети.
    </div>

    <span class="section-label reveal">[ system_users ]</span>

    <div id="team-grid"></div>

    <div class="footer">
        made by @recidivismnational // sys_id_026
    </div>
</div>

<script>
    const team = [
        { n: "@xuvof", r: "осинт/эдитор", e: "osint/editor" },
        { n: "@fallen_fly", r: "осинт", e: "osint" },
        { n: "@recidivismnational", r: "кодер/дизайнер", e: "coder/designer" },
        { n: "@fucksomer", r: "осинт", e: "osint" },
        { n: "@UnTaLeNteD0", r: "тролль", e: "troll" },
        { n: "@loreitov", r: "осинт", e: "osint" },
        { n: "@Bladiclavaa", r: "тролль", e: "troll" },
        { n: "@wortix69", r: "осинт/тролль", e: "osint/troll" },
        { n: "@aominx", r: "осинт", e: "osint" },
        { n: "@martxxxxxxxxx", r: "осинт", e: "osint" }
    ];

    const langData = {
        ru: { head: "blood ravens", sub: "основано 2026 // активная защита :3", desc: "мы используем <b>osint</b> и цифровые инструменты для обеспечения безопасности. наша цель — защита мирных пользователей и пресечение деструктивной деятельности в сети." },
        en: { head: "blood ravens", sub: "est. 2026 // active defense :3", desc: "we utilize <b>osint</b> and digital tools to maintain security. our mission is to protect peaceful users and neutralize destructive online activity." }
    };

    function setLang(lang) {
        document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
        if(lang === 'ru') document.getElementById('btn-ru').classList.add('active');
        else document.getElementById('btn-en').classList.add('active');
        
        document.getElementById('t-head').innerText = langData[lang].head;
        document.getElementById('t-sub').innerText = langData[lang].sub;
        document.getElementById('t-desc').innerHTML = langData[lang].desc;

        const grid = document.getElementById('team-grid');
        grid.innerHTML = team.map(m => `
            <div class="card">
                <div class="nick">${m.n}</div>
                <div class="role">${lang === 'ru' ? m.r : m.e}</div>
            </div>
        `).join('');
    }

    setLang('ru');
    ScrollReveal().reveal('.reveal', { delay: 100, distance: '10px', origin: 'bottom', interval: 50 });
</script>

</body>
</html>

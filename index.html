<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>blood ravens // terminal</title>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@300;400;500;600&family=Inter:wght@100;200;300;400;600&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/scrollreveal"></script>
    <style>
        :root {
            --bg: #030305;
            --term-bg: rgba(10, 10, 15, 0.6); /* Прозрачность для стекла */
            --accent: #ff007f; /* Ярко-розовый */
            --accent-glow: rgba(255, 0, 127, 0.5);
            --text-main: #e0e0e0;
            --text-dim: #505050;
            --border: rgba(255, 0, 127, 0.2);
            --font-mono: 'Fira Code', monospace;
            --font-main: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg);
            color: var(--text-main);
            font-family: var(--font-main);
            margin: 0; padding: 0;
            overflow-x: hidden;
            text-transform: lowercase;
            font-weight: 300;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* ТЕ САМЫЕ НЕОНОВЫЕ СФЕРЫ НА ФОНЕ */
        #particleCanvas {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        .container { 
            width: 90%; 
            max-width: 900px; 
            margin: 0 auto; 
            padding: 50px 0; 
            position: relative; 
            z-index: 1; 
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* LANG SWITCHER */
        .lang-switch { display: flex; gap: 12px; justify-content: flex-end; width: 100%; margin-bottom: 25px; }
        .lang-btn { background: rgba(255,255,255,0.02); border: 1px solid var(--border); color: var(--text-dim); cursor: pointer; padding: 6px 14px; font-family: var(--font-mono); font-size: 11px; border-radius: 6px; transition: 0.3s; }
        .lang-btn.active { color: var(--accent); border-color: var(--accent); background: rgba(255, 0, 127, 0.05); box-shadow: 0 0 10px var(--accent-glow); }

        /* ЮИ - ГЛАВНЫЙ ЛОГОТИП (СВЕТИТСЯ ПОСТОЯННО) */
        .logo-wrap {
            margin-bottom: 45px;
            display: flex;
            justify-content: center;
            cursor: pointer;
            transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .logo-wrap:hover { transform: scale(1.05) rotate(2deg); }
        .clan-logo {
            width: 140px;
            height: 140px;
            border-radius: 50%;
            border: 2px solid var(--border);
            object-fit: cover;
            animation: breathing 4s ease-in-out infinite; /* Постоянный пульс */
        }
        @keyframes breathing {
            0%, 100% { box-shadow: 0 0 25px var(--accent-glow); transform: scale(1); filter: contrast(1.1) brightness(0.95); }
            50% { box-shadow: 0 0 55px var(--accent-glow); transform: scale(1.02); filter: contrast(1.15) brightness(1.05); }
        }

        /* ХЕДЕР С ЭФФЕКТОМ МЕРЦАНИЯ ТЕКСТА */
        .terminal-header {
            background: var(--term-bg);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 50px;
            text-align: center;
            width: 100%;
            backdrop-filter: blur(20px); /* Матовое стекло */
            box-sizing: border-box;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
        }
        .term-title { 
            color: var(--accent); 
            font-size: 30px; 
            letter-spacing: 7px; 
            font-weight: 600; 
            font-family: var(--font-mono);
            animation: flicker 4s infinite; /* Мерцание */
        }
        @keyframes flicker {
            0%, 19%, 21%, 23%, 25%, 54%, 56%, 100% { text-shadow: 0 0 15px var(--accent-glow); opacity: 1; }
            20%, 24%, 55% { text-shadow: none; opacity: 0.8; }
        }
        .term-sub { font-size: 11px; color: var(--text-dim); margin-top: 8px; letter-spacing: 3px; font-family: var(--font-mono); }

        /* МАНИФЕСТ (СТЕКЛО) */
        .info-block {
            margin-bottom: 60px;
            padding: 30px;
            background: var(--term-bg);
            border: 1px solid var(--border);
            border-radius: 18px;
            backdrop-filter: blur(15px);
            font-size: 15px;
            line-height: 1.8;
            width: 100%;
            box-sizing: border-box;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            font-weight: 200;
        }
        .info-block b { color: var(--accent); font-weight: 500; }

        .section-label { font-size: 10px; color: var(--text-dim); margin: 40px 0 30px 0; letter-spacing: 6px; text-transform: uppercase; display: block; width: 100%; text-align: left; font-family: var(--font-mono); }

        /* СЕТКА УЧАСТНИКОВ */
        #team-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            width: 100%;
            perspective: 1000px; /* Глубина для 3D */
        }
        .card {
            background: var(--term-bg);
            border: 1px solid var(--border);
            padding: 22px;
            border-radius: 16px;
            backdrop-filter: blur(12px);
            transition: transform 0.2s cubic-bezier(0.4, 0, 0.2, 1), box-shadow 0.3s, border-color 0.3s;
            position: relative;
            transform-style: preserve-3d; /* База для 3D */
            cursor: pointer;
        }
        /* ТА САМАЯ 3D АНИМАЦИЯ ПОЯВЛЕНИЯ ПРИ НАВЕДЕНИИ */
        .card:hover { 
            border-color: var(--accent); 
            box-shadow: 0 15px 50px rgba(255, 0, 127, 0.25); 
            background: rgba(255, 0, 127, 0.03);
            /* Transform задаётся через JS */
        }
        
        .nick { font-weight: 600; color: #fff; font-size: 16px; font-family: var(--font-mono); letter-spacing: 1px; pointer-events: none;}
        .role { color: var(--accent); font-size: 11px; margin-top: 6px; opacity: 0.9; letter-spacing: 2px; font-family: var(--font-mono); pointer-events: none;}

        .footer {
            text-align: center;
            padding: 100px 0 30px 0;
            font-size: 10px;
            color: #1a1a1a;
            letter-spacing: 5px;
            width: 100%;
            position: relative;
            z-index: 1;
            font-family: var(--font-mono);
        }
    </style>
</head>

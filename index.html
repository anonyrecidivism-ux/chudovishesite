<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TERMINAL // OSINT UNIT</title>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@300;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0a0a;
            --term-bg: #121212;
            --accent: #ff0000; /* Кроваво-красный */
            --text: #d0d0d0;
            --dim: #333;
            --border: #222;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Fira Code', monospace;
            margin: 0; padding: 0;
            overflow-x: hidden;
            text-transform: lowercase;
        }

        .container { width: 92%; max-width: 800px; margin: 0 auto; padding: 30px 0; }

        /* LANG SWITCHER */
        .lang-switch { display: flex; gap: 15px; justify-content: flex-end; margin-bottom: 20px; }
        .lang-btn { background: none; border: 1px solid var(--border); color: var(--dim); cursor: pointer; padding: 4px 10px; font-family: inherit; font-size: 11px; }
        .lang-btn.active { color: var(--accent); border-color: var(--accent); }

        /* РЕАЛЬНЫЙ ВОРОН (ГЛИФ) */
        .logo-wrap { text-align: center; margin-bottom: 30px; }
        .raven-glyph { font-size: 70px; color: var(--accent); filter: drop-shadow(0 0 10px rgba(255, 0, 0, 0.4)); line-height: 1; }

        /* ТЕРМИНАЛ ХЕДЕР */
        .terminal-header {
            border-bottom: 1px solid var(--border);
            padding-bottom: 20px;
            margin-bottom: 30px;
        }
        .term-title { color: var(--accent); font-size: 18px; letter-spacing: 2px; font-weight: 500; }
        .term-sub { font-size: 10px; color: var(--dim); margin-top: 5px; letter-spacing: 1px; }

        /* ИНФО БЛОК */
        .info-block {
            margin-bottom: 40px;
            padding: 18px;
            border: 1px dashed var(--border);
            font-size: 13px;
            line-height: 1.6;
            background: rgba(255,0,0,0.01);
        }
        .info-block b { color: var(--accent); }

        /* ЗАГОЛОВОК СЕКЦИИ */
        .section-label { font-size: 11px; color: var(--dim); margin-bottom: 20px; text-transform: uppercase; letter-spacing: 3px; display: block; }

        /* СЕТКА УЧАСТНИКОВ */
        #team-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(230px, 1fr));
            gap: 12px;
        }
        .card {
            background: var(--term-bg);
            border: 1px solid var(--border);
            padding: 15px;
            transition: 0.15s;
            position: relative;
        }
        .card:hover { border-color: var(--accent); background: rgba(255,0,0,0.02); }
        .card::before { content: ">"; position: absolute; left: 8px; color: var(--accent); opacity: 0; transition: 0.15s; }
        .card:hover::before { opacity: 1; }
        
        .nick { font-weight: 500; color: #fff; margin-left: 15px; font-size: 14px; }
        .role { color: var(--accent); font-size: 11px; margin-top: 4px; margin-left: 15px; opacity: 0.8; letter-spacing: 1px; }

        .footer {
            text-align: center;
            padding: 80px 0 20px 0;
            font-size: 10px;
            color: #1a1a1a;
            letter-spacing: 4px;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="lang-switch">
        <button class="lang-btn active" id="btn-ru" onclick="setLang('ru')">ru</button>
        <button class="lang-btn" id="btn-en" onclick="setLang('en')">en</button>
    </div>

    <div class="logo-wrap">
        <div class="raven-glyph">𓄿</div>
    </div>

    <header class="terminal-header">
        <div class="term-title" id="t-head">рут@осинт_подразделение:~#</div>
        <div class="term-sub" id="t-sub">established 2026 // active protection :3</div>
    </header>

    <div class="info-block" id="t-desc">
        мы используем <b>osint</b> и цифровые инструменты для обеспечения безопасности. наша цель — защита мирных пользователей и пресечение деструктивной деятельности в сети.
    </div>

    <span class="section-label">[ system_users ]</span>

    <div id="team-grid">
        </div>

    <div class="footer">
        made by @recidivismnational // sys_id_026
    </div>
</div>

<script>
    // Весь список, как ты просил
    const team = [
        { n: "@xuvof", r: "осинт/эдитор", e: "osint/editor" },
        { n: "@fallen_fly", r: "осинт", e: "osint" },
        { n: "@recidivismnational", r: "кодер/дизайнер", e: "coder/designer" },
        { n: "@fucksomer", r: "осинт", e: "osint" },
        { n: "@UnTaLeNteD0", r: "тролль", e: "troll" },
        { n: "@loreitov", r: "осинт", e: "osint" },
        { n: "@Bladiclavaa", r: "тролль", e: "troll" },
        { n: "@wortix69", r: "осинт/тролль", e: "osint/troll" },
        { n: "@aominx", r: "осинт", e: "osint" },
        { n: "@martxxxxxxxxx", r: "осинт", e: "osint" }
    ];

    const langData = {
        ru: { head: "рут@осинт_подразделение:~#", sub: "основано 2026 // активная защита :3", desc: "мы используем <b>osint</b> и цифровые инструменты для обеспечения безопасности. наша цель — защита мирных пользователей и пресечение деструктивной деятельности в сети." },
        en: { head: "root@osint_unit:~#", sub: "est. 2026 // active defense :3", desc: "we utilize <b>osint</b> and digital tools to maintain security. our mission is to protect peaceful users and neutralize destructive online activity." }
    };

    function setLang(lang) {
        document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
        if(lang === 'ru') document.getElementById('btn-ru').classList.add('active');
        else document.getElementById('btn-en').classList.add('active');
        
        document.getElementById('t-head').innerText = langData[lang].head;
        document.getElementById('t-sub').innerText = langData[lang].sub;
        document.getElementById('t-desc').innerHTML = langData[lang].desc;

        const grid = document.getElementById('team-grid');
        grid.innerHTML = team.map(m => `
            <div class="card">
                <div class="nick">${m.n}</div>
                <div class="role">${lang === 'ru' ? m.r : m.e}</div>
            </div>
        `).join('');
    }

    // Запуск (по умолчанию русский)
    setLang('ru');
</script>

</body>
</html>

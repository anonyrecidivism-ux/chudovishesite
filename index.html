<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>хуйня ебаная ♪</title>
<link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;700;800&family=Fira+Code:wght@400;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0a0a;
  --p1:#e8e8e8;--p2:#ffffff;--p3:#c0c0c0;
  --p4:#aaaaaa;--p5:#dddddd;--p6:#cccccc;
  --card:rgba(255,255,255,0.04);
  --border:rgba(255,255,255,0.12);
  --text:#d0d0d0;--muted:#666666;
}
body{
  background:var(--bg);color:var(--text);
  font-family:'M PLUS Rounded 1c',sans-serif;
  overflow-x:hidden;-webkit-tap-highlight-color:transparent;
  min-height:100vh;
}

/* BG */
.bg-orbs{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden}
.orb{position:absolute;border-radius:50%;filter:blur(80px);animation:orbMove linear infinite}
.orb1{width:350px;height:350px;background:#ffffff;opacity:0.03;top:-100px;left:-80px;animation-duration:20s}
.orb2{width:280px;height:280px;background:#ffffff;opacity:0.025;bottom:-60px;right:-60px;animation-duration:25s;animation-direction:reverse}
.orb3{width:200px;height:200px;background:#ffffff;opacity:0.02;top:40%;right:10%;animation-duration:18s;animation-delay:-8s}
@keyframes orbMove{0%{transform:translate(0,0)}33%{transform:translate(20px,-20px)}66%{transform:translate(-15px,25px)}100%{transform:translate(0,0)}}

canvas{position:fixed;inset:0;z-index:0;pointer-events:none}

/* ═══ HERO BANNER ═══ */
.hero{
  position:relative;z-index:1;
  width:100%;
  background:linear-gradient(135deg,rgba(255,255,255,0.05),rgba(255,255,255,0.02));
  border-bottom:1px solid var(--border);
  padding:0;
  overflow:hidden;
  min-height:200px;
  display:flex;
  align-items:stretch;
}
.hero-left{
  flex:1;
  padding:32px 24px 28px;
  display:flex;flex-direction:column;justify-content:center;
  position:relative;z-index:2;
}
.hero-tag{
  font-family:'Fira Code',monospace;
  font-size:9px;color:#888;
  letter-spacing:3px;margin-bottom:10px;
  display:flex;align-items:center;gap:6px;
}
.hero-tag::before{content:'';width:20px;height:1px;background:var(--p4)}
.hero-title{
  font-size:32px;font-weight:800;line-height:1.1;
  background:linear-gradient(135deg,#ffffff 0%,#aaaaaa 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  margin-bottom:8px;
}
.hero-sub{font-size:12px;color:var(--muted);line-height:1.6;max-width:220px}
.hero-sub b{color:var(--p5)}
.hero-stats{
  display:flex;gap:16px;margin-top:18px;
}
.hstat{display:flex;flex-direction:column;align-items:center}
.hstat-n{font-size:20px;font-weight:800;color:var(--p1);line-height:1}
.hstat-l{font-size:8px;color:var(--muted);letter-spacing:1px;margin-top:2px}

.hero-right{
  width:130px;flex-shrink:0;
  position:relative;
  display:flex;align-items:flex-end;justify-content:center;
}
.yui-img{
  width:110px;height:110px;
  object-fit:cover;object-position:50% 12%;
  border-radius:20px;
  border:2px solid rgba(255,255,255,0.2);
  box-shadow:-4px 4px 24px rgba(255,255,255,0.08);
  animation:yuiFloat 4s ease-in-out infinite;
  display:block;
  margin-bottom:12px;
}
@keyframes yuiFloat{
  0%,100%{transform:translateY(0) rotate(-1deg)}
  50%{transform:translateY(-8px) rotate(1deg)}
}


/* ═══ NAV TABS ═══ */
.nav-tabs{
  position:sticky;top:0;z-index:50;
  background:rgba(15,10,30,0.9);
  backdrop-filter:blur(16px);
  border-bottom:1px solid var(--border);
  display:flex;overflow-x:auto;
  scrollbar-width:none;padding:0 16px;
}
.nav-tabs::-webkit-scrollbar{display:none}
.nav-tab{
  flex-shrink:0;
  padding:12px 16px;font-size:11px;font-weight:700;
  color:var(--muted);cursor:pointer;
  border-bottom:2px solid transparent;
  transition:color 0.2s,border-color 0.2s;
  letter-spacing:0.5px;white-space:nowrap;
}
.nav-tab.active{color:#fff;border-bottom-color:#fff}

/* ═══ CONTENT ═══ */
.content{position:relative;z-index:1;padding:20px 16px 80px;max-width:600px;margin:0 auto}

/* SECTIONS */
.section{display:none}
.section.active{display:block}

/* ═══ OPERATORS GRID ═══ */
.ops-header{
  display:flex;justify-content:space-between;align-items:center;
  margin-bottom:14px;
}
.ops-title{font-size:14px;font-weight:700;color:#fff}
.ops-count{
  font-family:'Fira Code',monospace;font-size:10px;
  background:rgba(192,132,252,0.1);border:1px solid rgba(192,132,252,0.25);
  color:var(--p1);padding:3px 9px;border-radius:10px;
}

.search-row{
  display:flex;gap:8px;margin-bottom:16px;
}
.search-input{
  flex:1;background:var(--card);border:1px solid var(--border);
  color:var(--text);font-family:'M PLUS Rounded 1c',sans-serif;
  font-size:12px;padding:10px 14px;outline:none;border-radius:12px;
  transition:border-color 0.3s,box-shadow 0.3s;
}
.search-input::placeholder{color:rgba(167,139,202,0.35)}
.search-input:focus{border-color:#fff;box-shadow:0 0 14px rgba(255,255,255,0.1)}

/* 2-COLUMN GRID */
.team-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}

.op-card{
  background:var(--card);border:1px solid var(--border);
  border-radius:14px;padding:14px 12px;
  cursor:pointer;position:relative;overflow:hidden;
  transition:transform 0.2s,background 0.2s,box-shadow 0.2s;
  display:flex;flex-direction:column;gap:6px;
}
.op-card::before{
  content:'';position:absolute;top:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,transparent,var(--role-color,var(--p1)),transparent);
  opacity:0.6;
}
.op-card:active{transform:scale(0.95);background:rgba(192,132,252,0.1);box-shadow:0 0 20px rgba(192,132,252,0.2)}
.op-nick{font-size:12px;font-weight:700;color:#fff;word-break:break-all}
.op-role{
  font-size:9px;letter-spacing:1px;
  padding:2px 8px;border-radius:8px;
  display:inline-block;font-weight:700;
  background:rgba(255,255,255,0.06);
}
.op-dot{
  width:5px;height:5px;border-radius:50%;background:var(--p4);
  display:inline-block;margin-right:4px;
  animation:dotGlow 2s ease-in-out infinite;vertical-align:middle;
}
@keyframes dotGlow{0%,100%{box-shadow:0 0 0 0 rgba(160,160,160,0.4)}50%{box-shadow:0 0 0 3px rgba(160,160,160,0)}}

/* ═══ INFO SECTION ═══ */
.info-banner{
  background:rgba(255,255,255,0.03);
  border:1px solid var(--border);border-radius:16px;
  padding:20px;margin-bottom:14px;
  position:relative;overflow:hidden;
}
.info-banner::after{
  content:'♪';position:absolute;right:16px;bottom:12px;
  font-size:40px;opacity:0.06;
}
.info-title{font-size:13px;font-weight:700;color:var(--p2);margin-bottom:8px}
.info-body{font-size:12px;color:var(--muted);line-height:1.8}
.info-body b{color:var(--p1)}

.rule-list{display:flex;flex-direction:column;gap:8px;margin-top:14px}
.rule{
  display:flex;gap:10px;align-items:flex-start;
  background:var(--card);border:1px solid var(--border);
  border-radius:12px;padding:12px 14px;font-size:11px;color:var(--muted);
  line-height:1.6;
}
.rule-icon{font-size:16px;flex-shrink:0;margin-top:1px}

/* ═══ LOG SECTION ═══ */
.log-terminal{
  background:#000;border:1px solid rgba(192,132,252,0.2);
  border-radius:14px;overflow:hidden;
}
.log-topbar{
  background:rgba(192,132,252,0.08);
  padding:10px 14px;display:flex;align-items:center;gap:6px;
  border-bottom:1px solid rgba(192,132,252,0.15);
}
.log-dot{width:8px;height:8px;border-radius:50%}
.ld1{background:#ff5f57}.ld2{background:#febc2e}.ld3{background:#28c840}
.log-title{font-family:'Fira Code',monospace;font-size:10px;color:var(--muted);margin-left:6px}
.log-body{padding:14px;font-family:'Fira Code',monospace;font-size:10px;color:rgba(192,132,252,0.6);min-height:120px}
.log-line{margin:3px 0;animation:logIn 0.4s ease}
@keyframes logIn{from{opacity:0;transform:translateX(-6px)}to{opacity:1;transform:translateX(0)}}

/* TOAST */
.toast{
  position:fixed;bottom:24px;left:50%;
  transform:translateX(-50%) translateY(20px);
  background:linear-gradient(135deg,#e0e0e0,#ffffff);
  color:#0a0a0a;font-weight:800;font-size:11px;
  padding:8px 18px;border-radius:20px;
  opacity:0;transition:all 0.3s;z-index:9999;
  pointer-events:none;letter-spacing:0.3px;
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* REVEAL */
.reveal{opacity:0;transform:translateY(14px);transition:opacity 0.6s,transform 0.6s}
.reveal.visible{opacity:1;transform:none}
.rc{opacity:0;transform:scale(0.92);transition:opacity 0.45s,transform 0.45s}
.rc.visible{opacity:1;transform:none}

.no-results{grid-column:1/-1;text-align:center;padding:30px;color:var(--muted);font-size:12px}
</style>
</head>

  for(let i=0;i<20;i++) pts.push({x:Math.random()*cv.width,y:Math.random()*cv.height,vx:(Math.random()-.5)*.2,vy:(Math.random()-.5)*.2,r:.4+Math.random()*.6,c:cols[Math.floor(Math.random()*cols.length)]});
}
function drawP(){
  cx.clearRect(0,0,cv.width,cv.height);
  pts.forEach(p=>{p.x+=p.vx;p.y+=p.vy;if(p.x<0)p.x=cv.width;if(p.x>cv.width)p.x=0;if(p.y<0)p.y=cv.height;if(p.y>cv.height)p.y=0;cx.beginPath();cx.arc(p.x,p.y,p.r,0,Math.PI*2);cx.fillStyle=p.c+'0.55)';cx.fill();});
  requestAnimationFrame(drawP);
}
window.addEventListener('resize',initP);initP();drawP();

/* SOUND */
function playBeep(){
  try{
    const a=new(window.AudioContext||window.webkitAudioContext)(),t=a.currentTime;
    const b=a.createBuffer(1,a.sampleRate*.04,a.sampleRate),d=b.getChannelData(0);
    for(let i=0;i<d.length;i++) d[i]=(Math.random()*2-1)*Math.pow(1-i/d.length,12);
    const n=a.createBufferSource();n.buffer=b;
    const hpf=a.createBiquadFilter();hpf.type='highpass';hpf.frequency.setValueAtTime(1800,t);
    const ng=a.createGain();ng.gain.setValueAtTime(0.14,t);ng.gain.exponentialRampToValueAtTime(0.001,t+.04);
    n.connect(hpf);hpf.connect(ng);ng.connect(a.destination);n.start(t);n.stop(t+.04);
    const o=a.createOscillator();o.type='sine';o.frequency.setValueAtTime(880,t);o.frequency.exponentialRampToValueAtTime(660,t+.03);
    const og=a.createGain();og.gain.setValueAtTime(0.04,t);og.gain.exponentialRampToValueAtTime(0.001,t+.03);
    o.connect(og);og.connect(a.destination);o.start(t);o.stop(t+.03);
  }catch(e){}
}

  entries.forEach(e=>{if(e.isIntersecting){e.target.classList.add('visible');obs.unobserve(e.target);}}); 
},{threshold:0.08});
document.querySelectorAll('.reveal').forEach(el=>obs.observe(el));
